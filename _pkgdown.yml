url: https://andersonheri.github.io/acR/
template:
  bootstrap: 5
  bootswatch: cosmo
  bslib:
    primary: "#0072B2"
    base_font: {google: "Inter"}
    heading_font: {google: "Inter"}
    code_font: {google: "JetBrains Mono"}

development:
  mode: auto

home:title: acR — Análise de Conteúdo em R
  sidebar:
    structure: [links, license, community, citation, authors, dev]
  title: acR — Análise de Conteúdo em R
  description: >
    Pipeline integrado de análise de conteúdo em R, combinando codificação
    qualitativa via LLMs com análise quantitativa clássica e visualização
    moderna, com foco em corpora brasileiros.
  links:
  - text: Repositório no GitHub
    href: https://github.com/andersonheri/acR
  - text: Reportar problema
    href: https://github.com/andersonheri/acR/issues

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    intro:
      text: Comece aqui
      href: articles/acR.html
    articles:
      text: Vignettes
      menu:
      - text: "Visao geral do pacote"
        href: articles/acR.html
      - text: "---"
      - text: "Pipeline qualitativo"
      - text: Codificacao com LLMs
        href: articles/qualitativo-llm.html
      - text: "---"
      - text: "Pipeline quantitativo"
      - text: Analise de frequencias e keyness
        href: articles/quantitativo.html
      - text: Analise de sentimento
        href: articles/sentimento.html
      - text: Modelagem de topicos (LDA)
        href: articles/lda.html

reference:
- title: "Coleta de dados"
  desc: "Importacao de textos de fontes abertas brasileiras."
  contents:
  - ac_fetch_camara
  - ac_fetch_senado

- title: "Corpus e pre-processamento"
  desc: "Criacao, limpeza e tokenizacao de corpus em portugues."
  contents:
  - ac_corpus
  - ac_clean
  - ac_tokenize
  - is_ac_corpus

- title: "Analise quantitativa"
  desc: >
    Frequencias, associacoes e modelagem estatistica de textos.
    Funcoes principais do pipeline quantitativo.
  contents:
  - ac_count
  - ac_top_terms
  - ac_tf_idf
  - ac_keyness
  - ac_cooccurrence
  - ac_sentiment
  - ac_lda
  - ac_lda_tune

- title: "Codificacao qualitativa via LLM"
  desc: >
    Pipeline de analise de conteudo qualitativa assistida por modelos de
    linguagem. Suporta Anthropic, OpenAI, Google, Groq, Ollama e qualquer
    provedor OpenAI-compativel (incluindo LLMs institucionais).
  contents:
  - ac_qual_codebook
  - ac_qual_search_literature
  - ac_qual_code
  - ac_qual_save_codebook
  - ac_qual_load_codebook

- title: "Validacao e confiabilidade"
  desc: >
    Amostragem para validacao humana, metricas de concordancia inter-codificador
    e importacao/exportacao de codificacoes humanas.
  contents:
  - ac_qual_irr
  - ac_qual_reliability
  - ac_qual_sample
  - ac_qual_export_for_review
  - ac_qual_import_human

- title: "Selecao de modelos LLM"
  desc: >
    Listagem e recomendacao de modelos LLM para analise de conteudo qualitativa,
    com informacoes de custo, contexto e suporte ao portugues.
  contents:
  - ac_qual_list_models
  - ac_qual_recommend_model

- title: "Visualizacao"
  desc: "Graficos modernos baseados em ggplot2 para todos os modulos."
  contents:
  - starts_with("ac_plot_")
  - ac_wordcloud

- title: "Exportacao"
  desc: "Exporta resultados para CSV, LaTeX, Excel e RDS."
  contents:
  - ac_export

footer:
  structure:
    left: developed_by
    right: built_with

