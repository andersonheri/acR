url: https://andersonheri.github.io/acR/
template:
  bootstrap: 5
  light-switch: true
  bslib:
    primary: "#0F3D5C"
    secondary: "#D97706"
    success: "#166534"
    info: "#0F766E"
    warning: "#B45309"
    danger: "#991B1B"
    base_font:
      google: {family: "Inter", wght: [400, 500, 600, 700]}
    heading_font:
      google: {family: "Inter Tight", wght: [500, 600, 700, 800]}
    code_font:
      google: {family: "JetBrains Mono", wght: [400, 500]}
    bg: "#FBFAF7"
    fg: "#1F2937"
    border-radius: "0.5rem"
    btn-border-radius: "0.5rem"
    navbar-brand-font-weight: 700
    headings-font-weight: 700
  includes:
    in_header: |
      <meta name="description" content="acR: pacote R para analise de conteudo integrada (qualitativa via LLMs + quantitativa classica), com foco em corpora brasileiros.">
      <meta property="og:title" content="acR — Analise de Conteudo em R">
      <meta property="og:description" content="Pipeline reproduzivel para pesquisa em ciencias sociais: codebooks, LLMs, keyness, LDA, sentimento.">
      <meta property="og:type" content="website">
      <meta name="twitter:card" content="summary_large_image">
    after_body: |
      <style>
        .contents h1, .contents h2, .contents h3 { letter-spacing: -0.01em; }
        .navbar-brand { letter-spacing: -0.02em; }
        pre { border-radius: 0.5rem; }
        .badge { font-weight: 500; }
      </style>
development:
  mode: auto
home:
  title: acR — Analise de Conteudo em R
  description: >
    Pipeline integrado de analise de conteudo em R, combinando codificacao
    qualitativa via LLMs com analise quantitativa classica e visualizacao
    moderna, com foco em corpora brasileiros.
  links:
  - text: Repositorio no GitHub
    href: https://github.com/andersonheri/acR
  - text: Reportar problema
    href: https://github.com/andersonheri/acR/issues
navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    intro:
      text: Comece aqui
      href: articles/quickstart.html
    articles:
      text: Vignettes
      menu:
      - text: "Quickstart (5 min)"
        href: articles/quickstart.html
      - text: "Visao geral do pacote"
        href: articles/introducao-acR.html
      - text: "---"
      - text: "Pipeline qualitativo"
      - text: Codificacao com LLMs
        href: articles/qualitativo-llm.html
      - text: Analise de proposicoes com qwen3.6
        href: articles/analise-proposicoes.html
      - text: "---"
      - text: "Pipeline quantitativo"
      - text: Analise de frequencias e keyness
        href: articles/quantitativo.html
      - text: Analise de sentimento
        href: articles/sentimento.html
      - text: Modelagem de topicos (LDA)
        href: articles/lda.html
articles:
  - title: "Introducao"
    contents:
      - quickstart
      - introducao-acR
  - title: "Pipeline qualitativo"
    contents:
      - qualitativo-llm
      - analise-proposicoes
  - title: "Pipeline quantitativo"
    contents:
      - quantitativo
      - sentimento
      - lda
reference:
- title: "Comece aqui — funcoes principais"
  desc: >
    Os cinco pontos de entrada mais usados do pacote. Se voce esta comecando,
    aprenda estas primeiro; o resto do pipeline se conecta em torno delas.
  contents:
  - ac_corpus
  - ac_count
  - ac_qual_codebook
  - ac_qual_code
  - ac_qual_reliability
- title: "Coleta de dados"
  desc: "Importacao de textos de fontes abertas brasileiras."
  contents:
  - ac_fetch_camara
  - ac_fetch_senado
- title: "Corpus e pre-processamento"
  desc: "Criacao, limpeza e tokenizacao de corpus em portugues."
  contents:
  - ac_corpus
  - ac_import
  - ac_clean
  - ac_clean_stopwords
  - ac_tokenize
  - is_ac_corpus
- title: "Analise quantitativa"
  desc: >
    Frequencias, associacoes e modelagem estatistica de textos.
  contents:
  - ac_count
  - ac_top_terms
  - ac_tf_idf
  - ac_keyness
  - ac_cooccurrence
  - ac_sentiment
  - ac_lda
  - ac_lda_tune
- title: "Codificacao qualitativa via LLM"
  desc: >
    Pipeline de analise de conteudo qualitativa assistida por LLMs:
    criacao e gestao de codebooks, enriquecimento com literatura,
    traducao, fusao e geracao de system prompts.
  contents:
  - ac_qual_codebook
  - ac_qual_codebook_add
  - ac_qual_codebook_remove
  - ac_qual_codebook_hybrid
  - ac_qual_codebook_merge
  - ac_qual_codebook_translate
  - ac_qual_codebook_history
  - as_prompt
  - ac_qual_search_literature
  - ac_qual_code
  - ac_qual_save_codebook
  - ac_qual_load_codebook
- title: "Validacao e confiabilidade"
  desc: >
    Amostragem, concordancia inter-codificador e importacao/exportacao.
  contents:
  - ac_qual_irr
  - ac_qual_reliability
  - ac_qual_sample
  - ac_qual_export_for_review
  - ac_qual_import_human
- title: "Selecao de modelos LLM"
  desc: >
    Listagem e recomendacao de modelos LLM.
  contents:
  - ac_qual_list_models
  - ac_qual_recommend_model
- title: "Visualizacao"
  desc: "Graficos modernos baseados em ggplot2."
  contents:
  - starts_with("ac_plot_")
  - ac_wordcloud
- title: "Exportacao"
  desc: "Exporta resultados para CSV, LaTeX, Excel e RDS."
  contents:
  - ac_export
footer:
  structure:
    left: developed_by
    right: built_with
